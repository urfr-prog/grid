// ════════════════════════════════════════════
//  TWIN ABSORPTION (v28) — fonctions
// ════════════════════════════════════════════
function isMute(p){ return !!p && !p.face1 && !p.face2; }
// Twin = MIROIR VISUEL. On compare la signature visuelle [top,right,bottom,left] après
// rotation (getExposedFace gère 0/90/180/270). Ainsi (circle/line, rot=0) et
// (line/circle, rot=180) sont reconnus comme identiques visuellement (O en haut, — en bas).
function twinIcons(a,b){
  if(!a||!b) return false;
  if(isRegress(a)||isRegress(b)) return false;
  if(isMute(a)||isMute(b))       return false;
  const sa = ['top','right','bottom','left'].map(d=>getExposedFace(a,d));
  const sb = ['top','right','bottom','left'].map(d=>getExposedFace(b,d));
  return sa[0]===sb[0] && sa[1]===sb[1] && sa[2]===sb[2] && sa[3]===sb[3];
}
// Trouve une paire twin alignée PERPENDICULAIREMENT à la longueur du domino, couloir vide.
// Le "côté" d'un domino = arêtes COURTES (perpendiculaires à sa longueur).
//   • Portrait (rot 0/180) → longueur verticale, côtés = gauche/droite → twin sur MÊME RANGÉE
//   • Horizontal (rot 90/270) → longueur horizontale, côtés = haut/bas → twin sur MÊME COLONNE
// Deux dominos sur l'axe LONG (portrait/même colonne, ou horizontal/même rangée) "se font face"
// par leurs grandes faces et relèvent de la fusion classique, jamais du twin.
// twinIcons (signature visuelle) garantit que B a la même orientation que A : on n'a donc
// qu'à examiner rotA pour décider du sens de scan.
function findTwinPair(d){
  for(let i=0;i<TOTAL;i++){ const a=d[i]; if(!a)continue;
    const ax=colOf(i), ay=rowOf(i);
    const rotA = ((a.rotation||0)%360+360)%360;
    const portraitA = (rotA===0 || rotA===180);
    if(portraitA){
      // côtés gauche/droite → scan même rangée vers la droite
      for(let cx=ax+1; cx<COLS; cx++){ const j=ay*COLS+cx; const b=d[j];
        if(b){ if(twinIcons(a,b)) return {i1:i,i2:j}; break; }
      }
    } else {
      // côtés haut/bas → scan même colonne vers le bas
      for(let cy=ay+1; cy<ROWS; cy++){ const j=cy*COLS+ax; const b=d[j];
        if(b){ if(twinIcons(a,b)) return {i1:i,i2:j}; break; }
      }
    }
  }
  return null;
}
function performTwinAbsorb(i1,i2){
  B.busy=true;
  const d=curBoard();
  const p1=d[i1], p2=d[i2];
  const hi1=STATE_ORDER.indexOf(p1.state||'white');
  const hi2=STATE_ORDER.indexOf(p2.state||'white');
  // Gagnant : état le plus fort ; ex-aequo → _settle (lastMoved) le plus récent
  let wIdx, lIdx;
  if(hi1>hi2)       { wIdx=i1; lIdx=i2; }
  else if(hi2>hi1)  { wIdx=i2; lIdx=i1; }
  else { const t1=p1._settle||0, t2=p2._settle||0;
         if(t1>=t2){ wIdx=i1; lIdx=i2; } else { wIdx=i2; lIdx=i1; } }
  const winner=d[wIdx], loser=d[lIdx];
  showToast('Twin ! → '+(winner.state||'white'));
  const ml=loser.mesh, mw=winner.mesh;
  if(!ml||!mw){
    if(loser.mesh)removeDomino(loser.mesh); d[lIdx]=null;
    setTimeout(()=>{ assignFaces(); updateUI(); B.busy=false; checkFusions(); checkCompletion(); },60);
    return;
  }
  // Animation : perdant glisse vers gagnant (scale down + fade) puis disparaît ;
  // gagnant pulse + glow blanc à l'arrivée pour signaler l'absorption (homogène avec la fusion).
  const lStart=ml.position.clone(), wPos=mw.position.clone();
  // v48 : glow blanc bref sur le PERDANT dès le départ → montre que la twin (même latérale) AGIT.
  { const gl=ml.userData.glow; if(gl){ gl.material.color.set(0xffffff); gl.material.opacity=0.85; } }
  let elapsed=0; const durMove=240, durFade=140, durPulse=200;
  const moveAnim=(now)=>{
    if(!moveAnim._last)moveAnim._last=now;
    elapsed+=(now-moveAnim._last)*TS; moveAnim._last=now;
    const p=Math.min(elapsed/durMove,1), e=easeInOutQuad(p);
    ml.position.lerpVectors(lStart,wPos,e);
    const sc=1-0.45*e; ml.scale.set(sc,sc,sc);
    if(p<1)requestAnimationFrame(moveAnim);
    else{ elapsed=0; moveAnim._last=null; requestAnimationFrame(fadeAnim); }
  };
  const fadeAnim=(now)=>{
    if(!fadeAnim._last)fadeAnim._last=now;
    elapsed+=(now-fadeAnim._last)*TS; fadeAnim._last=now;
    const p=Math.min(elapsed/durFade,1);
    ml.traverse(c=>{ if(c.material&&'opacity'in c.material)c.material.opacity=(1-p); });
    if(p<1)requestAnimationFrame(fadeAnim);
    else{
      removeDomino(loser.mesh); d[lIdx]=null;
      // v48 : glow blanc sur le GAGNANT pendant le pulse (signal de fusion homogène).
      { const gw=mw.userData.glow; if(gw){ gw.material.color.set(0xffffff); gw.material.opacity=0.85; } }
      let pe=0; fadeAnim._last=null;
      const pulseAnim=(now2)=>{
        if(!pulseAnim._last)pulseAnim._last=now2;
        pe+=(now2-pulseAnim._last)*TS; pulseAnim._last=now2;
        const pp=Math.min(pe/durPulse,1);
        const k=Math.sin(pp*Math.PI);                 // 0 → 1 → 0
        const sc2=1+0.14*k; mw.scale.set(sc2,sc2,sc2);
        { const gw=mw.userData.glow; if(gw)gw.material.opacity=0.85*(1-pp); }   // glow s'éteint progressivement
        if(pp<1)requestAnimationFrame(pulseAnim);
        else{ mw.scale.set(1,1,1); { const gw=mw.userData.glow; if(gw)gw.material.opacity=0; } winner._settle=clock.getElapsedTime();
              assignFaces(); updateUI(); B.busy=false; checkFusions(); checkCompletion(); }
      };
      requestAnimationFrame(pulseAnim);
    }
  };
  requestAnimationFrame(moveAnim);
}

// Fusion simple V4 : les deux faces qui se touchent disparaissent, les faces partenaires
// montent d'un état et forment le domino résultat, posé sur la case de d1.
// easings portés du prisme (utilisés par l'animation de fusion)
function easeInOutQuad(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
function performFusion(i1,i2,dir){
  B.busy=true;
  const d=curBoard(); const p1=d[i1], p2=d[i2];
  const fuseDir1 = dir==='h'?'right':'bottom';
  const fuseDir2 = dir==='h'?'left':'top';
  const nf1 = getRemainingFace(p1,fuseDir1) || p1.face2;
  const nf2 = getRemainingFace(p2,fuseDir2) || p2.face2;
  // v11 (règle 1A) : l'état du résultat est UN CRAN AU-DESSUS DU PLUS HAUT des deux pièces,
  // sur la seule base de l'icône (l'égalité d'état n'est plus requise). blanc+blanc→silver,
  // gold+silver→emerald, gold+gold→emerald.
  const hi1 = STATE_ORDER.indexOf(p1.state||'white');
  const hi2 = STATE_ORDER.indexOf(p2.state||'white');
  const upState = nextStateName(STATE_ORDER[Math.max(hi1,hi2)]);
  const newRot = dir==='h'?90:0;
  showToast('Fusion ! → '+upState);

  const m1=p1.mesh, m2=p2.mesh;
  if(!m1||!m2){
    // fallback sans anim (sécurité)
    if(p2.mesh)removeDomino(p2.mesh); d[i2]=null;
    if(dir==='h'){ p1.face1=nf2; p1.face2=nf1; p1.rotation=0; } else { p1.face1=nf1; p1.face2=nf2; p1.rotation=90; }
    p1.state=upState; p1.state1=upState; p1.state2=upState; refreshTex(p1); placePiece(p1);
    setTimeout(()=>{ assignFaces(); updateUI(); B.busy=false; checkFusions(); checkCompletion(); },60);
    return;
  }
  // ── SÉQUENCE D'ANIMATION PORTÉE À L'IDENTIQUE DE prisme : move(400) → fade(200) → appear(400) ──
  const p1s=m1.position.clone(), p2s=m2.position.clone();
  const mid=p1s.clone().add(p2s).multiplyScalar(0.5);
  let elapsed=0; const durMove=200,durFade=110,durAppear=220;
  const moveAnim=(now)=>{
    if(!moveAnim._last)moveAnim._last=now;
    elapsed+=(now-moveAnim._last)*TS; moveAnim._last=now;
    const p=Math.min(elapsed/durMove,1), e=easeInOutQuad(p);
    m1.position.lerpVectors(p1s,mid,e); m2.position.lerpVectors(p2s,mid,e);
    const sc=1-0.3*e; m1.scale.set(sc,sc,sc); m2.scale.set(sc,sc,sc);
    if(p<1)requestAnimationFrame(moveAnim);
    else{ elapsed=0; moveAnim._last=null; requestAnimationFrame(fadeAnim); }
  };
  const fadeAnim=(now)=>{
    if(!fadeAnim._last)fadeAnim._last=now;
    elapsed+=(now-fadeAnim._last)*TS; fadeAnim._last=now;
    const p=Math.min(elapsed/durFade,1);
    m1.traverse(c=>{ if(c.material&&'opacity'in c.material)c.material.opacity=(1-p); });
    m2.traverse(c=>{ if(c.material&&'opacity'in c.material)c.material.opacity=(1-p); });
    if(p<1)requestAnimationFrame(fadeAnim);
    else{
      // mutation logique au creux de la fusion : p1 devient le résultat, p2 disparaît
      if(p2.mesh)removeDomino(p2.mesh); d[i2]=null;
      if(dir==='h'){ p1.face1=nf2; p1.face2=nf1; p1.rotation=0; } else { p1.face1=nf1; p1.face2=nf2; p1.rotation=90; }
      p1.state=upState; p1.state1=upState; p1.state2=upState;
      refreshTex(p1); placePiece(p1); p1._settle=clock.getElapsedTime();
      // restaurer l'opacité après le fade : faceMesh + corps + ombre.
      // (edge/glow/ring/halo sont réécrits chaque frame par animate selon l'état)
      const ud=p1.mesh.userData;
      ud.faceMesh.material.opacity=1;
      if(ud.shadow&&ud.shadow.material)ud.shadow.material.opacity=0.45;
      // le corps extrudé a deux matériaux (faces 0.35 / côtés 0.5)
      p1.mesh.children.forEach(c=>{
        if(Array.isArray(c.material)){ if(c.material[0])c.material[0].opacity=0.35; if(c.material[1])c.material[1].opacity=0.5; }
      });
      // appear : le résultat surgit en scale 0.3 → 1
      p1.mesh.scale.set(0.3,0.3,0.3); elapsed=0; fadeAnim._last=null;
      const appearAnim=(now2)=>{
        if(!appearAnim._last)appearAnim._last=now2;
        elapsed+=(now2-appearAnim._last)*TS; appearAnim._last=now2;
        const p2v=Math.min(elapsed/durAppear,1), e2=easeOutCubic(p2v);
        const sc2=0.3+0.7*e2; p1.mesh.scale.set(sc2,sc2,sc2);
        if(p2v<1)requestAnimationFrame(appearAnim);
        else{ p1.mesh.scale.set(1,1,1); assignFaces(); updateUI(); B.busy=false; checkFusions(); checkCompletion(); }
      };
      requestAnimationFrame(appearAnim);
    }
  };
  requestAnimationFrame(moveAnim);
}

// ─── COMPLÉTION DU PLAN : cible atteinte → le résultat descend sur la case imposée, puis on avance ───
let migrating=false;
function countPieces(arr){ let n=0; for(const p of arr) if(p) n++; return n; }
function checkCompletion(){
  // v20 : PLATEAU UNIQUE — plus de gradation ni de migration entre plans.
  // (Conservé débranché : la complétion/objectif reviendra par config sur de futurs niveaux.)
  return;
}

function migrateDown(result){
  migrating=true; B.busy=true;
  const nextBoard=mod(B.currentBoard+1);
  // l'état du résultat est RÉTROGRADÉ en traversant (coût de la migration, variable par plan)
  const landedState=demoteState(result.state, demoteFor(nextBoard));
  // poser une copie du résultat (rétrogradé) sur la case d'accueil imposée du plan suivant (si libre)
  if(!boards[boardKey(B.currentLayer,nextBoard)][LANDING_IDX]){
    const nkey=boardKey(B.currentLayer,nextBoard);
    const mesh=createDominoMesh(result.face1,result.face2,landedState,false,0); mesh.visible=false; addDomino(mesh,nkey);
    boards[nkey][LANDING_IDX]={
      state:landedState, state1:landedState, state2:landedState,
      face1:result.face1, face2:result.face2, rotation:0, mesh, face:nextBoard, layer:B.currentLayer, key:nkey
    };
  }
  // retirer le résultat du plan de tête (il a "traversé")
  const head=boards[boardKey(B.currentLayer,B.currentBoard)];
  const hi=head.indexOf(result); if(hi>=0){ if(result.mesh)removeDomino(result.mesh); head[hi]=null; }
  assignFaces();
  const demoted = landedState!==result.state;
  showToast(demoted ? ('Traversée : '+result.state+' → '+landedState) : 'Niveau résolu → on avance');
  // déclenche le zoom-traversant vers le plan suivant
  setTimeout(()=>{ migrating=false; B.busy=false; navRight(); },140);
}
function flashFusion(p){ if(!p.mesh)return; const g=p.mesh.userData.glow;
  g.material.color.set(0xffffff); g.material.opacity=0.85; p.mesh.scale.set(1.15,1.15,1.15);
  setTimeout(()=>{ p.mesh.scale.set(1,1,1); g.material.opacity=0; },300); }
const clock=new THREE.Clock(); let last=0, tScaled=0;
// MODE RALENTI (debug 3D/zoom) : TS multiplie le dt des ticks ET les coeffs de lissage
// caméra/slerp (constants par frame). 1 = vitesse normale, 0.05 = très lent.
// v60k : TS est GLOBAL (vitesse commune aux deux systèmes) — déclaré hors factory.
// v60k : le slider interne est retiré → remplacé par la barre de contrôles COMMUNE.

// Cadre la pile pour qu'elle tienne à l'écran quel que soit le format (portrait mobile inclus).
function fitCamera(){
  const w=VW(), h=VH(), aspect=w/h;
  renderer.setSize(w,h,false); camera.aspect=aspect;
  // v60n5 : FIX iPhone notch. Le canvas est tourné -90°, donc sa LARGEUR CSS (avant rotation)
  // doit valoir VW (=hauteur du sys) et sa HAUTEUR CSS valoir VH (=largeur du sys). On le force
  // ici en pixels au lieu de 100vh/50vw, car 100vh inclut la safe-area (notch) que le .sys n'a
  // pas → sinon affichage et rendu divergent et le picking part en vrille.
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  const vFOV=camera.fov*Math.PI/180;
  // Comme prisme V11 : la grille occupe le maximum de largeur en ne laissant qu'un petit
  // interstice de chaque côté (~10px). On cadre en PRIORITÉ sur la largeur.
  const sidePx=10;                                         // interstice latéral souhaité
  const marginW=(w+2*sidePx)/w;                            // largeur cible = écran - 2*interstice
  const needW=(FACE_W*marginW)/(2*Math.tan(vFOV/2)*aspect);// distance pour remplir la largeur
  // v34 : zones réservées en haut (barre nav) et en bas (boutons pouce). La grille se cale
  // dans la bande centrale restante ; on recentre la caméra sur le milieu de cette bande.
  const topPx=58, botPx=92;                                // hauteurs réservées (CSS ci-dessus)
  const usableH=Math.max(1,h-topPx-botPx);
  const needH=(FACE_H*(h/usableH))/(2*Math.tan(vFOV/2));   // garde-fou hauteur sur la zone utile
  camera.position.z=Math.max(needW,needH);
  // décalage vertical : le centre de la zone utile n'est pas le centre écran.
  const centerShiftPx=(botPx-topPx)/2;                     // >0 si plus réservé en bas → viser plus haut
  const worldPerPx=(2*camera.position.z*Math.tan(vFOV/2))/h;
  const offY=centerShiftPx*worldPerPx;
  // v36 : la face courante a son contenu décalé de -PIVOT_X (axe de rotation sur col3/4).
  // On recentre la grille à l'écran en visant X=-PIVOT_X (la grille reste centrée de face,
  // mais bascule autour de col3/4 lors de la rotation cube).
  const offX=-PIVOT_X;
  // v36 : mémorise le cadrage PLEIN (toute la grille) comme borne large du zoom.
  baseFitZ=camera.position.z; baseFitY=offY; baseWorldPerPx=worldPerPx; vFOVcache=vFOV;
  camera.position.set(offX,offY,camera.position.z); camera.lookAt(offX,offY,0);
  camera.updateProjectionMatrix();
  refreshZoom();                                           // recale la cible de zoom sur le plateau courant
}
// v36 : ZOOM ADAPTATIF (repris de stereo/K5). Au lieu d'un Z fixe plein-cadre, on resserre
// la profondeur sur l'ÉTENDUE RÉELLE des dominos du plateau courant : moins il y a de pièces
// (plateaux allégés), plus on s'approche. Lissé dans animate (comme targetCamZ de K5).
let baseFitZ=CAM_Z, baseFitY=0, baseWorldPerPx=0.02, vFOVcache=42*Math.PI/180;
let targetCamZ=CAM_Z, targetCamY=0, targetCamX=-PIVOT_X;
// v60l : COORDINATION INTER-SYSTÈMES. refreshZoom publie ici l'échelle "solo" et l'emprise
// brute de CE système ; la coordination (dans animate) lit l'autre système via SYSTEMS et
// pose coordZ (échelle commune) + coordYShift (recentrage horizontal physique vers le centre).
let zoomSoloZ=CAM_Z;          // échelle que ce système voudrait seul
let coordZ=null;              // échelle commune imposée (null = pas encore coordonné)
let coordYShift=0;            // décalage horizontal-écran (axe Y logique) vers la médiane
// v37 : refreshZoom(boardIdx) calcule la cible de zoom pour un plateau donné (par défaut le
// courant). Appelé avec le plateau d'ARRIVÉE au lancement de la nav → le zoom vise déjà la
// bonne échelle pendant la rotation : un seul geste continu, plus de "deux temps".
function refreshZoom(boardIdx){
  // v68 : ÉCHELLE sur l'emprise RÉELLE des pièces (pour que tout rentre, des deux côtés),
  // mais CENTRAGE fixe (vue stable, la caméra ne court pas après les pièces).
  // zoomSoloZ alimente la coordination inter-systèmes (coordinate() prend le max → zoom commun).
  const bi = (boardIdx==null) ? B.currentBoard : mod(boardIdx);
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,n=0;
  for(let L=0;L<NLAYERS;L++){ const d=boards[boardKey(L,bi)]; if(!d)continue;
    for(let i=0;i<TOTAL;i++){ const p=d[i]; if(!p)continue; const {col,row}=getPos(i); const {x,y}=cellToLocal(col,row);
      minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);n++; } }
  // emprise = au moins la grille entière ; on étend si des pièces (glissées) dépassent.
  const exMinX=Math.min(-FACE_W/2, n?minX:Infinity), exMaxX=Math.max(FACE_W/2, n?maxX:-Infinity);
  const exMinY=Math.min(-FACE_H/2, n?minY:Infinity), exMaxY=Math.max(FACE_H/2, n?maxY:-Infinity);
  const padW=(exMaxX-exMinX)+2.0*CELL_W, padH=(exMaxY-exMinY)+2.0*CELL_W;
  const aspect=VW()/VH();
  const needZw=padW/(2*Math.tan(vFOVcache/2)*aspect);
  const needZh=padH/(2*Math.tan(vFOVcache/2));
  const z=Math.max(needZw,needZh);
  zoomSoloZ=z;                                 // échelle voulue par CE système seul
  targetCamZ=(coordZ!=null)?coordZ:z;          // suit l'échelle commune si coordonné
  targetCamY=0;                                // centré verticalement
  targetCamX=coordYShift;                      // v68 : à 0° le rapprochement des 2 côtés est sur X
}
camera.position.set(0,0,CAM_Z); camera.lookAt(0,0,0); fitCamera();
window.addEventListener('resize',fitCamera);

// ─── v60a : FONDATION FACTORY (palier mini, iso-v5) ──────────────────────────
//  Étape préparatoire au split-screen indépendant. On enveloppe l'état PAR-SYSTÈME
//  dans un objet SYS qui RÉFÉRENCE (ne duplique pas encore) les globals existants.
//  À ce stade il n'y a qu'UN système → rendu strictement identique à la v5.
//  Le 2e système (createSystem) viendra brancher sur cette même indirection.
const SYS = {
  root:   SYS_ROOT, // v60f : conteneur DOM du système (#sysA)
  canvas,           // v60f : canvas WebGL de ce système
  scene,            // THREE.Scene
  camera,           // THREE.PerspectiveCamera
  renderer,         // un contexte WebGL par système (à terme)
  // viewport logique du système dans le canvas (plein écran pour l'instant).
  vp:{ x:0, y:0, w:1, h:1 },
  render(){
    // rendu du système dans son viewport (ici plein écran → comportement v5).
    const W=VW(), H=VH();
    const px=Math.round(this.vp.x*W), py=Math.round(this.vp.y*H);
    const pw=Math.round(this.vp.w*W), ph=Math.round(this.vp.h*H);
    this.renderer.setViewport(px,py,pw,ph);
    this.renderer.render(this.scene,this.camera);
  },
  // v60k : actions exposées pour les CONTRÔLES COMMUNS (barre unique).
  undo(){ doUndo(); },
  setMedians(on){
    showMedians=on;
    for(const k in _texCache)delete _texCache[k];        // purge : la clé inclut l'état médiane
    boards.forEach(arr=>arr.forEach(p=>{ if(p)refreshTex(p); }));
  },
  refreshUndoBtn(){ updateUndoBtn(); },
  get histLen(){ return history.length; },
  // v60l : COORDINATION — l'échelle solo voulue par ce système, et le setter commun.
  get soloZ(){ return zoomSoloZ; },
  setCoord(z, yShift){
    // idempotent : ne recalcule que si l'échelle commune ou le décalage a réellement changé,
    // pour ne PAS relancer refreshZoom (parcours de tous les boards) à chaque frame.
    if(coordZ===z && coordYShift===yShift) return;
    coordZ=z; coordYShift=yShift;
    targetCamZ=z;    // la cloche de rotation gère le transitoire ; ici on cale la cible.
    refreshZoom();   // recalcule targetCamY avec le nouveau coordYShift + targetCamZ commun
  }
};
function animate(){ requestAnimationFrame(animate); const t=clock.getElapsedTime(); const dtRaw=t-last; last=t; const dt=dtRaw*TS; tScaled+=dt;
  if(B.isAnimating){
    // ROTATION DU CUBE : slerp doux vers l'orientation cible (façon mada)
    cubeGroup.quaternion.slerp(B.targetQuat,0.12*TS);
    if(1-Math.abs(cubeGroup.quaternion.dot(B.targetQuat))<0.0001){ cubeGroup.quaternion.copy(B.targetQuat); onRotationComplete(); }
  }
  tickSwap(dt);
  tickRot(dt);
  // faces à rendre : la courante, et pendant la rotation aussi la cible (les autres masquées)
  const targetBoard = B.isAnimating ? B.navTarget : B.currentBoard;
  boards.forEach((arr,key)=>arr.forEach((p,si)=>{ if(!p||!p.mesh)return; const ud=p.mesh.userData;
    const pl=Math.floor(key/NBOARDS), f=key%NBOARDS;          // v49 : layer + face réels
    let shown = (f===B.currentBoard)||(B.isAnimating&&f===targetBoard);
    // pendant la rotation, les cases-portes sont rendues par leurs PROXIES fixes : on masque le vrai
    if(B.isAnimating&&isPorteIdx(si)) shown=false;
    p.mesh.visible = shown;
    if(!shown) return;
    const ldim = (NLAYERS<2) ? 1 : layerDimFor(pl);          // atténuation de profondeur de CE layer
    // v50 : empilement à plat → le layer ACTIF se dessine au-dessus de l'inactif.
    if(NLAYERS>1){ const onTop = (pl===B.currentLayer); p.mesh.renderOrder = onTop?2:0;
      // v51 : à la bascule, l'inactif ne doit JAMAIS recouvrir l'actif. depthTest off
      // sur l'inactif → l'ordre de rendu (renderOrder) tranche seul, l'actif passe devant.
      p.mesh.traverse(c=>{ if(c.isMesh){ c.renderOrder = onTop?2:0;
        const mm = Array.isArray(c.material)?c.material:[c.material]; mm.forEach(m=>{ if(m) m.depthTest = onTop; }); } }); }
    // v51 : z marqué par layer (en plus du renderOrder) — l'actif devant, l'inactif derrière.
    if(!swapAnim){ p.mesh.position.z = (NLAYERS>1 && pl!==B.currentLayer) ? -SAT_LIFT : SAT_LIFT; }
    // balancement décoratif (suspendu pendant rotation cube / fusion / autres anims bloquantes ; ET sur la cible : immobile).
    if(p.mesh.visible&&!B.isAnimating&&!swapAnim&&!B.busy&&!(rotAnim&&rotAnim.mesh===p.mesh)&&p.baseQuat&&!p.target){ const ph=tScaled*1.2+si*1.7;
      const amp=Math.min(1,(t-(p._settle||0)));
      const bq=new THREE.Quaternion().setFromEuler(new THREE.Euler(0,0,Math.cos(ph*0.7)*0.008*amp)); p.mesh.quaternion.copy(p.baseQuat).multiply(bq); }
    const st=p.state||'white';
    // v29 : halos clignotants supprimés (lisibilité) ; liserés uniformisés (couleur par état, opacité fixe).
    const EDGE_OP = 0.5*ldim;
    ud.haloSprite.material.opacity = 0;
    ud.glowMesh.material.opacity = 0;
    if(st==='cosmic'){
      drawCosmicRing(ud.ringCanvas,tScaled*Math.PI/2);ud.ringTex.needsUpdate=true;ud.ringMesh.material.opacity=1;
      ud.edgeLines.material.color.set(0x8338ec);ud.edgeLines.material.opacity=EDGE_OP;
    } else if(st==='supernovae'||st==='plasma'){
      drawSupernovaeRing(ud.ringCanvas,tScaled*Math.PI*(st==='plasma'?1:2/3));ud.ringTex.needsUpdate=true;ud.ringMesh.material.opacity=1;
      ud.edgeLines.material.color.set(st==='plasma'?0xff2060:0xff8c00);ud.edgeLines.material.opacity=EDGE_OP;
    } else if(st==='emerald'){
      ud.ringMesh.material.opacity=0;
      ud.edgeLines.material.color.set(0x34d399);ud.edgeLines.material.opacity=EDGE_OP;
    } else if(st==='gold'){
      ud.ringMesh.material.opacity=0;
      ud.edgeLines.material.color.set(0xffd700);ud.edgeLines.material.opacity=EDGE_OP;
    } else if(st==='silver'){
      ud.ringMesh.material.opacity=0;
      ud.edgeLines.material.color.set(0x22d3ee);ud.edgeLines.material.opacity=EDGE_OP;
    } else {
      ud.ringMesh.material.opacity=0;
      ud.edgeLines.material.color.set(0xd2d2dc);ud.edgeLines.material.opacity=EDGE_OP;
    }
    ud.faceMesh.material.opacity = 1*ldim;
  }));
  // grilles : visibles seulement pour la face courante (+ cible pendant la rotation)
  gridMeshes.forEach(g=>{ if(!g)return; const f=g.userData.face, pl=g.userData.layer||0;
    g.visible = (f===B.currentBoard)||(B.isAnimating&&f===targetBoard);
    g.position.set(0,0,0);
    g.material.opacity = 0.5 * ((NLAYERS<2)?1:layerDimFor(pl)); });
  // PIÈCE FLOTTANTE (transfert) : reste fixe devant la caméra, en sus du cube qui tourne.
  if(lockedPiece&&lockedPiece.mesh){
    const m=lockedPiece.mesh; m.visible=true;
    const fz=(lockFloatBase?lockFloatBase.z:camera.position.z-3.0);
    m.position.set(camera.position.x,camera.position.y,fz); m.quaternion.identity();
    const pulse=1.12+Math.sin(tScaled*4)*0.03; m.scale.set(pulse,pulse,pulse);
    const ud=m.userData; if(ud&&ud.edgeLines){ ud.edgeLines.material.opacity=0.85; ud.faceMesh.material.opacity=1; }
  }
  // PROXIES-PORTES fixes : animés pendant la rotation, immobiles dans l'espace.
  porteProxies.forEach((m,k)=>{ const ud=m.userData; m.visible=true; const st=ud._porteState||'white';
    if(st==='cosmic'){ drawCosmicRing(ud.ringCanvas,tScaled*Math.PI/2+k*0.6); ud.ringTex.needsUpdate=true; ud.ringMesh.material.opacity=1;
      ud.edgeLines.material.color.set(0x8338ec); }
    else if(st==='supernovae'||st==='plasma'){ drawSupernovaeRing(ud.ringCanvas,tScaled*Math.PI*(st==='plasma'?1:2/3)); ud.ringTex.needsUpdate=true; ud.ringMesh.material.opacity=1;
      ud.edgeLines.material.color.set(st==='plasma'?0xff2060:0xff8c00); }
    else if(st==='emerald'){ ud.ringMesh.material.opacity=0; ud.edgeLines.material.color.set(0x34d399); }
    else if(st==='gold'){ ud.ringMesh.material.opacity=0; ud.edgeLines.material.color.set(0xffd700); }
    else if(st==='silver'){ ud.ringMesh.material.opacity=0; ud.edgeLines.material.color.set(0x22d3ee); }
    else { ud.ringMesh.material.opacity=0; ud.edgeLines.material.color.set(0xd2d2dc); }
    ud.edgeLines.material.opacity=0.5; ud.faceMesh.material.opacity=1; });
  // v39 : halo de porte (réacteurs bleu clair) supprimé — plus aucune animation de barre.
  // v38 : CAMÉRA — anti-débordement pendant la ROTATION. Le contenu, pivotant autour de
  // l'axe décalé (col3/4), balaie une largeur supérieure au cadrage serré : sans correction,
  // un bord de grille sort de l'écran en milieu de rotation. On recule donc transitoirement
  // en Z selon une CLOCHE (sin) : zoom serré au départ → recul au milieu de l'arc → zoom serré
  // à l'arrivée. Une seule courbe continue, donc le geste reste "en un temps" (pas d'à-coup).
  // v40 : le glissement n'utilise PLUS de dézoom brutal. À la place, refreshZoom est recalculé
  // en continu sur les positions VISUELLES réelles pendant le slide (voir applySlide) → le zoom
  // principal SUIT l'étendue qui passe de 3 à 4/5 colonnes. Ici, simple lissage vers targetCamZ.
  let zGoal=targetCamZ, bell=0;
  if(B.isAnimating){
    const aspect=VW()/VH();
    const halfSweep=(FACE_W/2+Math.abs(PIVOT_X))+0.4*CELL_W;
    const zSafe=halfSweep/(Math.tan(vFOVcache/2)*aspect);
    const dotv=Math.min(1,Math.abs(cubeGroup.quaternion.dot(B.targetQuat)));
    const angLeft=2*Math.acos(dotv);                  // radians restants (≈π/2 au départ)
    const prog=1-Math.min(1,angLeft/(Math.PI/2));     // 0→1
    bell=Math.sin(Math.min(1,Math.max(0,prog))*Math.PI); // 0 aux bords, 1 au milieu
    zGoal=targetCamZ + bell*Math.max(0, zSafe-targetCamZ);
  }
  // v41b : X partage LA MÊME cloche que Z. Au pic de l'arc (bell=1) on vise -PIVOT_X (axe
  // de bascule col3/4) ; aux extrémités (bell=0) on vise targetCamX (recentré sur les colonnes
  // occupées). Une seule courbe continue → Z, Y et X convergent ensemble, plus de désynchro.
  const xGoal=targetCamX + bell*(-PIVOT_X-targetCamX);
  camera.position.z += (zGoal-camera.position.z)*0.12*TS;
  camera.position.y += (targetCamY-camera.position.y)*0.08*TS;
  camera.position.x += (xGoal-camera.position.x)*0.12*TS;
  // v49 : lissage de la transition de profondeur entre layers (swipe vertical 2 doigts).
  if(NLAYERS>1){
    const lf=layerFade; layerFade += (B.currentLayer-layerFade)*0.14*TS;
    if(Math.abs(layerFade-lf)>0.0005) applyLayerDepth();   // ré-applique le dim pendant le glissement
    // décale tout le cube en Z pour amener le LAYER ACTIF au plan de référence (Z d'origine).
    // layerFade=0 → cube à -RADIUS (avant net) ; layerFade=1 → cube avancé de LAYER_GAP (arrière net).
    cubeGroup.position.z = -RADIUS + layerFade*LAYER_GAP;
  }
  camera.lookAt(camera.position.x, camera.position.y, 0);
  // v60a : rendu routé via la fondation factory (un seul système → iso-v5).
  SYS.render();
}
buildBoards(); assignFaces(); updateUI(); animate();
// v28 : check au démarrage pour détecter les twins déjà présents dans le board initial
setTimeout(checkFusions, 300);

return SYS;
} // ── fin createSystem ──────────────────────────────────────────────────────

// v70 R2 : MOTEUR UNIQUE — createSystem instancié UNE SEULE FOIS, sur le .sys plein écran.
const sysA = createSystem(document.getElementById('sysA'));
const SYSTEMS = [sysA];

// v70 R2 : la coordination d'échelle entre deux demi-écrans n'a plus lieu d'être (un seul
// système plein écran). L'échelle solo est gérée par refreshZoom interne ; rien à coordonner.

// v60k : BARRE DE CONTRÔLES COMMUNE — pilote les deux systèmes.
(function(){
  // — vitesse commune (TS global) —
  const sl=document.getElementById('tsSliderG'), lab=document.getElementById('tsLabelG');
  const updSpeed=()=>{ TS=Math.max(0.05, sl.value/100); lab.textContent=TS.toFixed(2)+'×'; };
  sl.addEventListener('input',updSpeed); updSpeed();

  // — médianes communes (on/off sur les deux) —
  let medOn=false;
  const med=document.getElementById('medBtnG');
  med.classList.toggle('off',!medOn);
  med.addEventListener('click',()=>{
    medOn=!medOn; med.classList.toggle('off',!medOn);
    SYSTEMS.forEach(s=>s.setMedians(medOn));
  });

  // — undo (moteur unique) —
  const undoBtn=document.getElementById('undoBtnG');
  const refreshUndo=()=>{ undoBtn.disabled = sysA.histLen===0; };
  undoBtn.addEventListener('click',()=>{ if(sysA.histLen>0){ sysA.undo(); sysA.refreshUndoBtn(); refreshUndo(); } });
  refreshUndo();
  setInterval(refreshUndo,400);   // garde l'état actif/désactivé à jour après chaque coup
})();

</script>
