<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  /* #stage tourné 90° vers la gauche (power en haut). Dimensions échangées :
     largeur layout = hauteur écran, hauteur layout = largeur écran. */
  #stage{ position:fixed; top:50%; left:50%;
          width:100vh; height:100vw;
          transform:translate(-50%,-50%) rotate(90deg); transform-origin:center center;
          background:#111; }
  #grid{ position:absolute; inset:0; display:grid;
         grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(5,1fr); gap:2px; padding:6px; box-sizing:border-box; }
  .cell{ background:#1a3; border-radius:8px; display:flex; align-items:center; justify-content:center;
         color:#fff; font:bold 20px monospace; }
  .cell.hit{ background:#fa0; }
  #dbg{ position:fixed; top:0; left:0; right:0; z-index:99; color:#0f0; font:bold 14px monospace; padding:6px; pointer-events:none; }
</style></head>
<body>
<div id="stage"><div id="grid"></div></div>
<div id="dbg">tape une case</div>
<script>
const grid=document.getElementById('grid'), stage=document.getElementById('stage'), dbg=document.getElementById('dbg');
const COLS=4, ROWS=5;
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const d=document.createElement('div'); d.className='cell'; d.dataset.c=c; d.dataset.r=r; d.textContent=c+','+r; grid.appendChild(d); }

// Picking : on retransforme clientX/clientY du repère ÉCRAN (paysage) vers le repère
// LAYOUT du stage (portrait, non tourné). rotate(90deg) vers la gauche :
//   point écran (X,Y) → point layout. On utilise getBoundingClientRect du grid + trigonométrie inverse.
// Méthode simple et robuste : elementFromPoint donne directement la bonne cellule, car le navigateur
// gère la transformation hit-test. On l'utilise comme RÉFÉRENCE de vérité.
stage.addEventListener('pointerdown', e=>{
  document.querySelectorAll('.cell.hit').forEach(x=>x.classList.remove('hit'));
  // VÉRITÉ NAVIGATEUR PURE : la cellule réellement sous le doigt. Le navigateur gère la
  // rotation CSS tout seul. On allume directement cette cellule, sans aucun calcul manuel.
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(el && el.classList.contains('cell')){
    el.classList.add('hit');
    dbg.textContent='touch\u00e9 = case '+el.textContent+'  (doit \u00eatre pile sous ton doigt)';
  } else {
    dbg.textContent='hors grille';
  }
});
</script>
</body></html>
